name: Build release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: windows-x64
          - os: ubuntu-latest
            asset: linux-x64
          - os: macos-15-intel
            asset: macos-x64
          - os: macos-15
            asset: macos-arm64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build application
        run: python -m PyInstaller --noconfirm --clean TG-Pic-Collector.spec

      - name: Create release archive on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Compress-Archive -Path "dist/TG Pic Collector" -DestinationPath "release-assets/TG-Pic-Collector-${{ github.ref_name }}-${{ matrix.asset }}.zip"

      - name: Create release archive on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/TG-Pic-Collector-${{ github.ref_name }}-${{ matrix.asset }}.tar.gz" -C dist "TG Pic Collector"

      - name: Create release archive on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent "dist/TG Pic Collector.app" "release-assets/TG-Pic-Collector-${{ github.ref_name }}-${{ matrix.asset }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TG-Pic-Collector-${{ matrix.asset }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --generate-notes --title "$GITHUB_REF_NAME"
